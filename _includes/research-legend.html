<nav class="page-legend" aria-label="On this page">
  <p class="page-legend__title">On this page</p>
  <ul class="page-legend__list">
    <li><a href="#research-program" class="page-legend__link">Research Program</a></li>
    <li><a href="#program-areas" class="page-legend__link">Program Areas</a></li>
    <li><a href="#outputs-collaborations" class="page-legend__link">Outputs &amp; Collaborations</a></li>
  </ul>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var links = document.querySelectorAll('.page-legend__link');
    if (!links.length || !('IntersectionObserver' in window)) return;

    var byId = {};
    links.forEach(function (link) {
      byId[link.getAttribute('href').slice(1)] = link;
    });

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        links.forEach(function (link) { link.classList.remove('is-active'); });
        var active = byId[entry.target.id];
        if (active) active.classList.add('is-active');
      });
    }, { rootMargin: '-40% 0px -55% 0px' });

    Object.keys(byId).forEach(function (id) {
      var section = document.getElementById(id);
      if (section) observer.observe(section);
    });
  });
</script>
